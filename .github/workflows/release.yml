name: Release Obsidian plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from manifest.json, for example 0.1.3
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release files
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib

          version = os.environ["RELEASE_VERSION"]
          manifest = json.loads(pathlib.Path("manifest.json").read_text())
          if manifest["version"] != version:
              raise SystemExit(f"manifest.json version {manifest['version']} does not match {version}")

          for path in ("main.js", "manifest.json", "styles.css"):
              if not pathlib.Path(path).is_file():
                  raise SystemExit(f"missing release asset: {path}")
          PY
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Create GitHub release
        run: |
          gh release create "$RELEASE_VERSION" \
            main.js manifest.json styles.css \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Pageden Sync $RELEASE_VERSION" \
            --notes "Release Pageden Sync $RELEASE_VERSION." \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
